name: eval
on: [push, workflow_dispatch]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # tag-pinned: this job holds CLAUDE_CONFIG_TOKEN, a floating @main could exfiltrate it
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: netrc for the private claude-config input
        env:
          TOKEN: ${{ secrets.CLAUDE_CONFIG_TOKEN }}
        run: |
          printf 'machine git.collar.sh login x-access-token password %s\n' "$TOKEN" > ~/.netrc
          chmod 600 ~/.netrc
          echo "NIX_CONFIG=netrc-file = $HOME/.netrc" >> "$GITHUB_ENV"
      - run: nix eval .#darwinConfigurations.otter.system.drvPath
      # coral auto-pulls the deploy branch hourly; a coral-only break must not pass CI (cheap, reuses otter's eval cache)
      - run: nix eval .#darwinConfigurations.coral.system.drvPath
      # tuna is x86_64-linux, so the ubuntu runner evals it natively. drvPath only
      # (a full build would compile the custom RE kernel, too heavy for CI).
      - run: nix eval .#nixosConfigurations.tuna.config.system.build.toplevel.drvPath
