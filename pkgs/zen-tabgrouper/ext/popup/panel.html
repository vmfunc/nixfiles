<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="panel.css" />
    <title>Tabgrouper</title>
  </head>
  <body>
    <header>
      <div class="title-row">
        <span class="title">tabgrouper</span>
        <div class="actions">
          <button id="reclassify" title="Reclassify all tabs now">↻</button>
          <button id="settings" title="Settings">⚙</button>
        </div>
      </div>
      <div id="status" class="status"></div>
    </header>

    <main>
      <section id="groups"></section>

      <section id="saved-section" class="hidden">
        <h2 class="saved-heading">saved <span id="saved-count" class="muted"></span></h2>
        <div id="saved"></div>
      </section>
    </main>

    <script src="panel.js"></script>
  </body>
</html>
