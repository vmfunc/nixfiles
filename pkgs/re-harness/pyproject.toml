[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "re-harness"
version = "0.1.0"
description = "Headless Claude Agent SDK batch RE triage runner"
requires-python = ">=3.11"
dependencies = ["claude-agent-sdk"]

[project.scripts]
re-harness = "re_harness:main"

[tool.setuptools]
py-modules = ["re_harness"]
